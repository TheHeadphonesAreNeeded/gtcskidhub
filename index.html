<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkidHub — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grid-bg" aria-hidden="true"></div>

  <header class="topbar">
    <span class="brand">SKIDHUB</span>
    <span class="topbar-status">
      <span class="pulse-dot"></span>
      BUILDING
    </span>
  </header>

  <main class="stage">

    <p class="prompt">
      <span class="prompt-sign">&gt;</span>
      <span id="typedLine"></span><span class="cursor">_</span>
    </p>

    <h1 class="headline">SkidHub is<br><span class="accent">almost online.</span></h1>
    <p class="subtext">
      Tools, resources, and a place to actually find things — without the clutter.
      We're finishing the build. Get on the list and you'll be first in when the doors open.
    </p>

    <section class="panel" aria-label="Build status">
      <div class="panel-head">
        <span>SYSTEM STATUS</span>
        <span id="progressLabel">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <ul class="modules" id="modulesList">
        <!-- populated from config.js -->
      </ul>
    </section>

    <!--
      Netlify Forms: this form is detected at deploy time because it has
      data-netlify="true" and a name. Submissions show up under
      Site settings > Forms in your Netlify dashboard — no backend needed.
    -->
    <form
      class="notify"
      id="notifyForm"
      name="skidhub-signup"
      method="POST"
      data-netlify="true"
      netlify-honeypot="company"
    >
      <input type="hidden" name="form-name" value="skidhub-signup">
      <div class="honeypot" aria-hidden="true">
        <label>Company<input name="company" tabindex="-1" autocomplete="off"></label>
      </div>
      <label for="email" class="sr-only">Email address</label>
      <span class="input-prefix">$</span>
      <input type="email" id="email" name="email" placeholder="you@somewhere.com" required autocomplete="email">
      <button type="submit">./notify_me</button>
    </form>

    <p class="status" id="status" role="status" aria-live="polite"></p>

    <footer class="footer">
      <span>UPTIME <span id="clock" class="clock">00:00:00</span></span>
      <span class="footer-divider">|</span>
      <span id="queueCount">— waiting</span>
    </footer>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
